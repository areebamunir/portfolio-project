<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Real-time attendance system (light)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.6" stop-color="#FFF8E7" />
      <stop offset="1" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F59E0B" />
      <stop offset="1" stop-color="#D97706" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b" />
      <feBlend in="SourceGraphic" in2="b" mode="multiply" />
    </filter>
  </defs>

  <rect width="1200" height="600" rx="44" fill="url(#bg)" />

  <g>
    <rect x="250" y="130" width="700" height="380" rx="28" fill="#0D0D0F" fill-opacity="0.03" stroke="#0D0D0F" stroke-opacity="0.10" />
    <rect x="280" y="160" width="640" height="320" rx="22" fill="#0D0D0F" fill-opacity="0.06" stroke="#0D0D0F" stroke-opacity="0.08" />
  </g>

  <g filter="url(#soft)">
    <path
      d="M600 205c-62 0-112 50-112 112c0 62 50 112 112 112c62 0 112-50 112-112c0-62-50-112-112-112Z"
      fill="#F59E0B"
      fill-opacity="0.12"
    />
    <path
      d="M600 226c-50 0-91 41-91 91c0 50 41 91 91 91c50 0 91-41 91-91c0-50-41-91-91-91Z"
      fill="#FBBF24"
      fill-opacity="0.10"
    />
  </g>

  <g fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round">
    <path d="M540 342c14 18 35 30 60 30s46-12 60-30" />
    <path d="M560 290c0-14 11-25 25-25s25 11 25 25" />
  </g>

  <g>
    <path d="M350 210h120" stroke="#0D0D0F" stroke-opacity="0.20" stroke-width="10" stroke-linecap="round" />
    <path d="M350 250h170" stroke="#0D0D0F" stroke-opacity="0.14" stroke-width="10" stroke-linecap="round" />
    <path d="M350 290h140" stroke="#0D0D0F" stroke-opacity="0.10" stroke-width="10" stroke-linecap="round" />
  </g>

  <g>
    <rect x="760" y="220" width="140" height="44" rx="16" fill="#F59E0B" fill-opacity="0.14" stroke="#D97706" stroke-opacity="0.30" />
    <path d="M794 242l14 14l34-34" stroke="#92400E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <text
      x="862"
      y="251"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="18"
      font-weight="800"
      fill="#0D0D0F"
      fill-opacity="0.92"
