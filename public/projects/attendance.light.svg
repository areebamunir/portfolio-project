      Present
    </text>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#0D0D0F">
    <text x="600" y="545" text-anchor="middle" font-size="20" fill-opacity="0.7">
